<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocky Animal</title>

    <style>
        :root {
            color-scheme: dark;
            --bg: #0c0c12;
            --panel: rgba(16, 18, 30, 0.95);
            --border: #2f3441;
            --text: #e9edf7;
            --accent: #4b85ff;
            --accent-strong: #2e66e8;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle at top, #141625 0%, var(--bg) 60%);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100%;
        }

        main {
            display: flex;
            flex-direction: column;
            flex: 1;
            width: 100%;
            min-height: 0;
            overflow: hidden;
        }

        #canvas {
            flex: 1;
            min-height: 0;
            width: 100%;
            display: block;
            background: #050609;
        }

        .controls {
            display: grid;
            grid-template-columns: auto 1fr auto auto auto auto;
            gap: 1rem;
            padding: 0.75rem 1rem;
            background: var(--panel);
            border-top: 1px solid var(--border);
            align-items: center;
            width: 100%;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-variant-numeric: tabular-nums;
        }

        .center-group,
        .right-group {
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .center-group {
            justify-self: center;
            gap: 0;
        }

        .right-group {
            justify-self: center;
            gap: 0.75rem;
        }

        .play-timeline {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 0;
        }

        .play-timeline input[type="button"] {
            border-radius: 0.65rem;
        }

        .play-timeline input[type="range"] {
            flex: 1;
            min-width: 0;
            accent-color: var(--accent);
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        label {
            font-size: 0.95rem;
            white-space: nowrap;
        }

        select,
        input[type="button"],
        input[type="range"] {
            font: inherit;
        }

        select,
        input[type="button"] {
            min-width: 0;
            padding: 0.55rem 0.85rem;
            border: 1px solid var(--border);
            border-radius: 0.65rem;
            background: #121524;
            color: var(--text);
        }

        input[type="button"] {
            cursor: pointer;
            background: var(--accent);
            border-color: var(--accent-strong);
            transition: background 0.18s ease;
        }

        input[type="button"]:hover {
            background: var(--accent-strong);
        }

        input[type="range"] {
            flex: 1;
            min-width: 0;
            accent-color: var(--accent);
        }

        .footer {
            padding: 0.75rem 1rem;
            font-size: 0.88rem;
            color: #9aa1b2;
            text-align: center;
            background: rgba(8, 10, 18, 0.98);
            border-top: 1px solid var(--border);
        }

        .extra-controls {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            background: var(--panel);
            border-top: none;
        }

        .extra-controls div {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>

    <script src="lib/cuon-matrix.js"></script>
    <script src="lib/cuon-utils.js"></script>

    <script src="renderer/glslShaders.js"></script>
    <script src="renderer/Mesh.js"></script>
    <script src="renderer/Camera.js"></script>
    <script src="renderer/Shader.js"></script>
    <script src="renderer/Renderer.js"></script>

    <script src="scene/Scene.js"></script>
    <script src="scene/Animation.js"></script>

    <script src="assets/sceneData.js"></script>
    <script src="assets/animData.js"></script>

    <script src="asg2.js"></script>
</head>

<body onload="main()">
    <main>
        <canvas id="canvas"></canvas>
        <section class="controls">
            <div class="status">
                <label id="FrameTime">ms: 0 fps: 0</label>
            </div>
            <div class="center-group play-timeline">
                <input type="button" id="PlayPause" value=">">
                <input type="range" min="0" max="100" value="0" id="Timeline">
                <label id="Time">0s / 0s</label>
            </div>
            <div class="right-group">
                <label for="Rotation">Rotation</label>
                <input type="range" min="-180" max="180" id="Rotation">
            </div>
        </section>
        <section class="extra-controls">
            <div>
                <input type="button" id="Jump" value="Jump">
            </div>

            <div>
                <label for="Neck">Neck</label>
                <input type="range" min="-90" max="90" id="Neck">
            </div>

            <div>
                <label for="Head">Head</label>
                <input type="range" min="-90" max="90" id="Head">
            </div>
        </section>
    </main>
</body>

</html>
